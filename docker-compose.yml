name: vps

services:
  dashboard:
    container_name: vps-dashboard
    image: commander15/openvps:dashboard-frontend-latest
    restart: unless-stopped
    build:
      context: ./admin/dashboard
    volumes:
      - ./admin/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./admin/config.json:/var/www/html/config.json
    ports:
      - "${VPS_PRIVATE_IP:-127.0.0.1}:8080:80"
    networks:
      - dashboard-network
    depends_on:
      dashboard-backend:
        condition: service_started
    profiles:
      - admin
      
  dashboard-backend:
    container_name: vps-dashboard-backend
    image: commander15/openvps:dashboard-backend-latest
    restart: unless-stopped
    build:
      context: ./admin/dashboard
    volumes:
      - ./admin/nginx2.conf:/etc/nginx/conf.d/default.conf
      - ./admin/config.json:/var/www/html/config.json
      - dashboard_data:/var/www/state
    environment:
      APP_NAME: VPSDashboard
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/state/dashboard.db
    expose:
      - "8000"
    networks:
      - dashboard-network
    profiles:
      - admin

  docker-manager:
    container_name: vps-docker-manager
    image: portainer/portainer-ce:2.39.4
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "${VPS_PRIVATE_IP:-127.0.0.1}:9000:9000"
    profiles:
      - admin
      
  proxy-manager:
    container_name: vps-proxy-manager
    image: jc21/nginx-proxy-manager:2.15.1
    restart: unless-stopped
    volumes:
      - nginx_data:/data
      - letsencrypt_data:/etc/letsencrypt
    networks:
      - frontend-network
    ports:
      - '${VPS_PUBLIC_IP:-0.0.0.0}:${HTTPS_PORT:-443}:443'
      - '${VPS_PUBLIC_IP:-0.0.0.0}:${HTTP_PORT:-80}:80'
      - '${VPS_PRIVATE_IP:-127.0.0.1}:81:81' # Admin dashboard
    profiles:
      - core

  db-manager:
    container_name: vps-db-manager
    image: dbgate/dbgate:7.2.1-alpine
    restart: unless-stopped
    volumes:
      - dbgate_data:/root/.dbgate
    networks:
      - database-network
    ports:
      - "${VPS_PRIVATE_IP:-127.0.0.1}:3000:3000"
    profiles:
      - admin

  file-manager:
    container_name: vps-file-manager
    image: machines/filestash:lowa
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - ${VPS_DEPLOYMENTS_DIR:-~/apps}:/app/deployments
      - filestash_data:/app/data/state
    networks:
      - backend-network
    ports:
      - "${VPS_PRIVATE_IP:-127.0.0.1}:8334:8334"
    profiles:
      - admin

volumes:
  dashboard_data:
  portainer_data:
  nginx_data:
  letsencrypt_data:
  dbgate_data:
  filestash_data:

networks:
  dashboard-network:
    driver: bridge
      
  frontend-network:
    external: true

  backend-network:
    external: true

  database-network:
    external: true
