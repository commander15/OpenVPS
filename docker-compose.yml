name: vps

services:
  dashboard:
    container_name: vps-dashboard
    image: commander15/openvps:dashboard-frontend-latest
    restart: unless-stopped
    build:
      context: ./admin/dashboard
    volumes:
      - ./admin/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./admin/config.json:/var/www/html/config.json
    ports:
      - "${VPS_PRIVATE_IP:-127.0.0.1}:${DASHBOARD_PORT:-8080}:80"
    networks:
      - dashboard-network
    depends_on:
      dashboard-backend:
        condition: service_started
    profiles:
      - admin
      
  dashboard-backend:
    container_name: vps-dashboard-backend
    image: commander15/openvps:dashboard-backend-latest
    restart: unless-stopped
    build:
      context: ./admin/dashboard
    volumes:
      - ./admin/nginx2.conf:/etc/nginx/conf.d/default.conf
      - ./admin/config.json:/var/www/html/config.json
      - dashboard_data:/var/www/state
    environment:
      APP_NAME: VPSDashboard
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/state/dashboard.db
    expose:
      - "8000"
    networks:
      - dashboard-network
    profiles:
      - admin

  docker-manager:
    container_name: vps-docker-manager
    image: portainer/portainer-ce:2.39.4
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - dashboard-network
    ports:
      - "${DOCKER_MANAGER_IP:-127.0.0.1}:${DOCKER_MANAGER_PORT:-9000}:9000"
    profiles:
      - admin
      
  proxy-manager:
    container_name: vps-proxy-manager
    image: jc21/nginx-proxy-manager:2.15.1
    restart: unless-stopped
    volumes:
      - nginx_data:/data
      - letsencrypt_data:/etc/letsencrypt
    networks:
      - frontend-network
      - dashboard-network
    ports:
      - '${HTTP_IP:-0.0.0.0}:${HTTPS_PORT:-443}:443'
      - '${HTTP_IP:-0.0.0.0}:${HTTP_PORT:-80}:80'
      - '${PROXY_MANAGER_IP:-127.0.0.1}:${PROXY_MANAGER_PORT:-81}:81' # Admin dashboard
    profiles:
      - core

  db-manager:
    container_name: vps-db-manager
    image: dbgate/dbgate:7.2.1-alpine
    restart: unless-stopped
    volumes:
      - dbgate_data:/root/.dbgate
    networks:
      - database-network
    ports:
      - "${DB_MANAGER_IP:-127.0.0.1}:${DB_MANAGER_PORT:-3000}:3000"
    profiles:
      - admin

  file-manager:
    container_name: vps-file-manager
    image: machines/filestash:lowa
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - ${VPS_DEPLOYMENTS_DIR:-~/apps}:/app/deployments
      - filestash_data:/app/data/state
    networks:
      - backend-network
    ports:
      - "${FILE_MANAGER_IP:-127.0.0.1}:${FILE_MANAGER_PORT:-8334}:8334"
    profiles:
      - admin
      
  dns-manager:
    container_name: vps-dns-manager
    image: technitium/dns-server:15.4.0
    restart: unless-stopped
    environment:
      DNS_SERVER_DOMAIN: vps-dns-server
      DNS_SERVER_LOG_FOLDER_PATH: /var/log/technitium/dns
      DNS_SERVER_ADMIN_PASSWORD: ${DNS_MANAGER_PASS}
    volumes:
      - ./etc/titanium-dns:/etc/dns
    networks:
      - frontend-network
    ports:
      - "${DNS_MANAGER_IP:-127.0.0.1}:${DNS_MANAGER_PORT:-5380}:5380/tcp" #DNS web console (HTTP)
      - "${DNS_IP:-127.0.0.1}:${DNS_PORT:-53}:53/udp" #DNS service
      - "${DNS_IP:-127.0.0.1}:${DNS_PORT:-53}:53/tcp" #DNS service
    profiles:
      - dns

volumes:
  dashboard_data:
  portainer_data:
  nginx_data:
  letsencrypt_data:
  dbgate_data:
  filestash_data:

networks:
  dashboard-network:
    driver: bridge
      
  frontend-network:
    external: true

  backend-network:
    external: true

  database-network:
    external: true
