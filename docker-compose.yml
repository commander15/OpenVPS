name: vps

services:
  proxy:
    container_name: vps_proxy
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '${VPS_PRIVATE_IP}:81:81' # Admin dashboard
    volumes:
      - nginx_data:/data
      - letsencrypt_data:/etc/letsencrypt
    networks:
      - vps_network
      - web_network
      
  minio:
    container_name: vps_minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    restart: unless-stopped
    expose:
      - "9000" # S3 API Port
    ports:
      - '${VPS_PRIVATE_IP}:9001:9001' # Web Dashboard UI Port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - vps_network
      - web_network
    command: server /data --console-address ":9001"

volumes:
  nginx_data:
  letsencrypt_data:
  minio_data:

networks:
  vps_network:
    external: true
    
  web_network:
    external: true
