name: vps

services:
  dashboard:
    container_name: vps-dashboard
    image: commander15/vps_dashboard:frontend-latest
    build:
      context: ./admin/dashboard
    volumes:
      - ./admin/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./admin/config.json:/var/www/html/config.json
    ports:
      - "${VPS_PRIVATE_IP}:8080:80"
    networks:
      - internal_network
    profiles:
      - admin
      
  dashboard-backend:
    container_name: vps-dashboard-backend
    image: commander15/vps_dashboard:backend-latest
    build:
      context: ./admin/dashboard
    volumes:
      - ./admin/nginx2.conf:/etc/nginx/conf.d/default.conf
      - ./admin/config.json:/var/www/html/config.json
    expose:
      - "8000"
    networks:
      - internal_network
    profiles:
      - admin

  docker-manager:
    container_name: vps-docker-manager
    image: portainer/portainer-ce:2.39.4
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "${VPS_PRIVATE_IP}:9000:9000"
    profiles:
      - admin

  db-manager:
    container_name: vps-db-manager
    image: dbgate/dbgate
    restart: unless-stopped
    volumes:
      - dbgate_data:/root/.dbgate
    ports:
      - "${VPS_PRIVATE_IP}:3000:3000"
    networks:
      - backend_network
    profiles:
      - admin

  proxy-manager:
    container_name: vps-proxy-manager
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '${VPS_PUBLIC_IP}:80:80'
      - '${VPS_PUBLIC_IP}:443:443'
      - '${VPS_PRIVATE_IP}:81:81' # Admin dashboard
    volumes:
      - nginx_data:/data
      - letsencrypt_data:/etc/letsencrypt
    networks:
      - web_network
    profiles:
      - core

  s3:
    container_name: vps-s3
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    restart: unless-stopped
    command: server /data --console-address ":9001"
    expose:
      - "9000" # S3 API Port
    ports:
      - '${VPS_PRIVATE_IP}:9001:9001' # Web Dashboard UI Port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - backend_network
    profiles:
      - core

volumes:
  portainer_data:
  dbgate_data:
  nginx_data:
  letsencrypt_data:
  minio_data:

networks:
  internal_network:
    driver: bridge
      
  web_network:
    external: true

  backend_network:
    external: true
