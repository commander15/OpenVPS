<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-black text-slate-100 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i class="fa-solid fa-server text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">VPS Control Center</h1>
                    <p class="text-xs text-indigo-400">System Administrator Panel</p>
                </div>
            </div>
            <div
                class="flex items-center space-x-2 bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-full text-xs font-semibold border border-emerald-500/20">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span>All Systems Operational</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-white">Active Services & Tools</h2>
            <p class="text-slate-400 mt-1">Quick access links and status monitoring for your deployed VPS tools.</p>
        </div>

        <div id="tools-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="col-span-full py-12 flex flex-col items-center justify-center text-slate-500">
                <i class="fa-solid fa-spinner animate-spin text-3xl mb-4 text-indigo-500"></i>
                <p>Loading configuration panel...</p>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-800 mt-20 py-6 text-center text-xs text-slate-500">
        <p>&copy; 2026 VPS Admin Panel. Built by Amadou Benjamain</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
