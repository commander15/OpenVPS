server {
    listen 80;
    server_name vps-admin.local; # Replace with your VPS IP or Domain

    # 1. Serve your static HTML / JS dashboard
    location / {
        root /var/www/html;
        index index.html;
    }

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Common reverse proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ==========================================
    # 1. PORTAINER PROXY (Native Subpath support)
    # ==========================================
    location /portainer/ {
        proxy_pass http://vps_portainer:9000/;
    }

    # ==========================================
    # 2. CLOUDBEAVER PROXY 
    # (Requires CLOUDBEAVER_ROOT_URI=/cloudbeaver/ in Docker)
    # ==========================================
    location /cloudbeaver/ {
        proxy_pass http://vps_cloudbeaver:8978/cloudbeaver/;
    }

    # ==========================================
    # 3. MINIO PROXY 
    # (Requires MINIO_BROWSER_REDIRECT_URL=.../minio/ in Docker)
    # ==========================================
    location /minio/ {
        proxy_pass http://vps_minio:9001/;
    }

    # ==========================================
    # 4. NGINX PROXY MANAGER PROXY & SUB-FILTERS
    # ==========================================
    location /proxy/ {
        proxy_pass http://vps_proxy:81/;
        proxy_set_header Accept-Encoding "";

        # Rewrite paths inside files served under /proxy/
        sub_filter_types text/html text/css text/xml application/javascript application/json;
        sub_filter '="/' '="/proxy/';
        sub_filter '=\'/' '=\'/proxy/';
        sub_filter_once off;
    }

    # Intercept hardcoded NPM root asset and API requests and forward them to NPM
    location ~ ^/(api|assets|login)/ {
        proxy_pass http://vps_proxy:81;
    }
}
