server {
    listen 80;
    server_name vps-dashboard.local;

    # 1. Serve your static HTML / JS dashboard
    location / {
        root /var/www/html;
        index index.html;
    }
    
    # 2. The Backend (Laravel/API)
    location /api/v1/ {
        proxy_pass http://vps-dashboard-backend:8000/api/v1/;
        
        # Standard proxy headers so your backend sees the real IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
